<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Страница не найдена — KOMUI</title>
<style>
  :root{--bg:#f7f5f2;--ink:#141414;--muted:#6b6b6b;--card:#ffffff;--line:#e5e1db}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:24px}
  main{max-width:520px;text-align:center}
  .code{font-size:96px;font-weight:800;letter-spacing:.04em;line-height:1;opacity:.12}
  h1{font-size:26px;margin:12px 0 10px;letter-spacing:.01em}
  p.note{color:var(--muted);font-size:15px;line-height:1.55;margin-bottom:26px}
  .links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  a.btn{display:inline-block;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;text-decoration:none;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:transform .15s ease}
  a.btn:hover{transform:translateY(-1px)}
  a.btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
  .foot{margin-top:34px;font-size:12.5px;color:var(--muted)}
  .foot a{color:inherit}
</style>
</head>
<body>
<main>
  <p class="code">404</p>
  <h1>Такой страницы нет</h1>
  <p class="note">Возможно, товар переехал на новый адрес или ссылка устарела. Каталог и коллекции на месте — загляните туда.</p>
  <div class="links">
    <a class="btn primary" href="/#catalog">Открыть каталог</a>
    <a class="btn" href="/">На главную</a>
    <a class="btn" href="/collections/naruto">Naruto</a>
    <a class="btn" href="/collections/jujutsu-kaisen">Jujutsu Kaisen</a>
  </div>
  <p class="foot">Нужна помощь с заказом? Ответы — в разделах <a href="/delivery">доставка</a> и <a href="/returns">возврат</a>.</p>
</main>
</body>
</html>
