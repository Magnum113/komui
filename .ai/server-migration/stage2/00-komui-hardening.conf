# Managed for the KOMUI migration.
# Password authentication remains enabled until the owner verifies a separate
# personal key. Root password login is disabled; root key login remains possible.
PermitRootLogin prohibit-password
PasswordAuthentication yes
PubkeyAuthentication yes
KbdInteractiveAuthentication no
PermitEmptyPasswords no
MaxAuthTries 4
LoginGraceTime 30
X11Forwarding no
UseDNS no
ClientAliveInterval 120
ClientAliveCountMax 2
